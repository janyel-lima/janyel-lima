  <line x1="0" y1="199" x2="900" y2="199" stroke="#7c3aed" stroke-width="1.5" class="bb"/>
  <path d="M0 0 L55 0 M0 0 L0 55" stroke="#7c3aed" stroke-width="1.5" fill="none" opacity="0.85"/>
  <path d="M900 0 L845 0 M900 0 L900 55" stroke="#7c3aed" stroke-width="1.5" fill="none" opacity="0.85"/>
