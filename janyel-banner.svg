  <circle cx="72" cy="100" r="8" fill="none" stroke="#7c3aed" stroke-width="1" class="r2"/>
  <circle cx="72" cy="100" r="8" fill="none" stroke="#7c3aed" stroke-width="0.8" class="r3"/>
  <circle cx="72" cy="100" r="6" fill="none" stroke="#a855f7" stroke-width="1" class="r4"/>
  <circle cx="72" cy="100" r="6" fill="none" stroke="#a855f7" stroke-width="0.8" class="r5"/>
  <circle cx="72" cy="100" r="5" fill="#7c3aed" class="lp"/>
  <circle cx="72" cy="100" r="2.5" fill="#ddd6fe"/>
  <circle cx="828" cy="100" r="8" fill="none" stroke="#7c3aed" stroke-width="1.2" class="r2"/>
  <circle cx="828" cy="100" r="8" fill="none" stroke="#7c3aed" stroke-width="0.8" class="r3"/>
  <circle cx="828" cy="100" r="5" fill="#7c3aed" class="lp"/>
  <circle cx="828" cy="100" r="2.5" fill="#ddd6fe"/>
  <circle cx="120" cy="100" r="2.2" fill="#7c3aed" class="d1"/>
  <circle cx="134" cy="100" r="2.2" fill="#7c3aed" class="d2"/>
  <circle cx="148" cy="100" r="2.2" fill="#7c3aed" class="d3"/>
  <circle cx="162" cy="100" r="2.2" fill="#7c3aed" class="d4"/>
  <circle cx="738" cy="100" r="2.2" fill="#7c3aed" class="d5"/>
  <circle cx="752" cy="100" r="2.2" fill="#7c3aed" class="d6"/>
  <circle cx="766" cy="100" r="2.2" fill="#7c3aed" class="d7"/>
  <circle cx="780" cy="100" r="2.2" fill="#7c3aed" class="d8"/>
  <line x1="120" y1="88" x2="175" y2="88" stroke="#7c3aed" stroke-width="0.5" opacity="0.4"/>
  <line x1="120" y1="112" x2="175" y2="112" stroke="#7c3aed" stroke-width="0.5" opacity="0.4"/>
  <line x1="725" y1="88" x2="780" y2="88" stroke="#7c3aed" stroke-width="0.5" opacity="0.4"/>
  <line x1="725" y1="112" x2="780" y2="112" stroke="#7c3aed" stroke-width="0.5" opacity="0.4"/>
  <g clip-path="url(#c1)">
    <text x="450" y="117" text-anchor="middle" font-family="'Orbitron',monospace" font-size="60" font-weight="900" fill="#ec4899" letter-spacing="2" class="ts1">JANYEL LIMA</text>
  </g>
  <g clip-path="url(#c2)">
    <text x="450" y="117" text-anchor="middle" font-family="'Orbitron',monospace" font-size="60" font-weight="900" fill="#06b6d4" letter-spacing="2" class="ts2">JANYEL LIMA</text>
  </g>
  <g clip-path="url(#c3)">
    <text x="450" y="117" text-anchor="middle" font-family="'Orbitron',monospace" font-size="60" font-weight="900" fill="#a855f7" letter-spacing="2" class="ts3">JANYEL LIMA</text>
  </g>
  <text x="450" y="117" text-anchor="middle" font-family="'Orbitron',monospace" font-size="60" font-weight="900" fill="#ffffff" letter-spacing="2" class="tm">JANYEL LIMA</text>
  <text x="450" y="158" text-anchor="middle" font-family="'Rajdhani','Orbitron',monospace" font-size="13.5" font-weight="700" fill="#7c3aed" letter-spacing="7" class="sub">UNLIMITED SOFTWARE WORKS</text>
  <rect width="900" height="1.5" fill="#7c3aed" opacity="0.12" class="sl" y="0"/>
