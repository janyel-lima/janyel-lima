<svg width="900" height="225" viewBox="0 0 900 225" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#7c3aed" stroke-width="0.35"/>
    </pattern>
    <radialGradient id="cg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#7c3aed" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#7c3aed" stop-opacity="0"/>
    </radialGradient>
    <clipPath id="c1"><rect x="0" y="60" width="900" height="19"/></clipPath>
    <clipPath id="c2"><rect x="0" y="82" width="900" height="17"/></clipPath>
    <clipPath id="c3"><rect x="0" y="102" width="900" height="19"/></clipPath>
  </defs>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&amp;family=Rajdhani:wght@700&amp;display=swap');

    /* Main title glitch */
    @keyframes gm{0%,82%,100%{transform:translateX(0)}84%{transform:translateX(-7px)}86%{transform:translateX(5px)}88%{transform:translateX(-3px)}90%{transform:translateX(4px)}92%{transform:translateX(-1px)}94%{transform:translateX(0)}}
    @keyframes gs1{0%,82%,100%{transform:translateX(0);opacity:0}84%{transform:translateX(11px);opacity:1}86%{transform:translateX(-9px);opacity:.85}88%{transform:translateX(7px);opacity:.9}90%{transform:translateX(-5px);opacity:.7}92%{transform:translateX(3px);opacity:.5}94%{transform:translateX(0);opacity:0}}
    @keyframes gs2{0%,82%,100%{transform:translateX(0);opacity:0}85%{transform:translateX(-14px);opacity:.8}87%{transform:translateX(10px);opacity:.6}89%{transform:translateX(-8px);opacity:.9}91%{transform:translateX(6px);opacity:.5}93%{transform:translateX(-2px);opacity:.3}95%{transform:translateX(0);opacity:0}}
    @keyframes gs3{0%,82%,100%{transform:translateX(0);opacity:0}83.5%{transform:translateX(9px);opacity:.7}85.5%{transform:translateX(-7px);opacity:.9}87.5%{transform:translateX(5px);opacity:.6}89.5%{transform:translateX(-3px);opacity:.8}91.5%{transform:translateX(1px);opacity:.4}93.5%{transform:translateX(0);opacity:0}}
    @keyframes fl{0%,93%,100%{opacity:1}95%{opacity:.55}96%{opacity:1}98%{opacity:.3}99%{opacity:.9}}

    /* Pulse rings */
    @keyframes rp{0%{r:8px;stroke-opacity:.9}100%{r:65px;stroke-opacity:0}}
    @keyframes rp2{0%{r:6px;stroke-opacity:.7}100%{r:50px;stroke-opacity:0}}
    @keyframes lp{0%,100%{opacity:.6}50%{opacity:1}}

    /* Dots */
    @keyframes dp{0%,100%{opacity:.15}50%{opacity:.9}}

    /* Borders */
    @keyframes bg{0%,100%{stroke-opacity:.45}50%{stroke-opacity:1}}

    /* Scan line */
    @keyframes sc{0%{transform:translateY(-5px);opacity:0}5%{opacity:1}95%{opacity:1}100%{transform:translateY(230px);opacity:0}}

    /* UNLIMITED SOFTWARE WORKS — shimmer charge:
       color brightens + micro-drift + letter-spacing breathes */
    @keyframes usw{
      0%,100%{fill:#5b21b6;letter-spacing:7px;transform:translateX(0)}
      25%{fill:#7c3aed;letter-spacing:7.5px;transform:translateX(0)}
      48%{fill:#a855f7;letter-spacing:9px;transform:translateX(0)}
      50%{fill:#a855f7;letter-spacing:9px;transform:translateX(-1.5px)}
      52%{fill:#a855f7;letter-spacing:9px;transform:translateX(1.5px)}
      54%{fill:#a855f7;letter-spacing:9px;transform:translateX(0)}
      75%{fill:#7c3aed;letter-spacing:7.5px;transform:translateX(0)}
    }

    /* void-works — the old breathing (opacity + letter-spacing) */
    @keyframes vw{
      0%,100%{opacity:.45;letter-spacing:10px}
      50%{opacity:.85;letter-spacing:13px}
    }

    .tm{animation:gm 8s infinite,fl 10s infinite}
    .ts1{animation:gs1 8s infinite}
    .ts2{animation:gs2 8s infinite .06s}
    .ts3{animation:gs3 8s infinite .12s}
    .r1{animation:rp 2.8s ease-out infinite}
    .r2{animation:rp 2.8s ease-out infinite .93s}
    .r3{animation:rp 2.8s ease-out infinite 1.86s}
    .r4{animation:rp2 2.2s ease-out infinite .4s}
    .r5{animation:rp2 2.2s ease-out infinite 1.1s}
    .sl{animation:sc 6s linear infinite}
    .d1{animation:dp 2.4s infinite 0s}.d2{animation:dp 2.4s infinite .3s}.d3{animation:dp 2.4s infinite .6s}.d4{animation:dp 2.4s infinite .9s}
    .d5{animation:dp 2.4s infinite .9s}.d6{animation:dp 2.4s infinite 1.2s}.d7{animation:dp 2.4s infinite 1.5s}.d8{animation:dp 2.4s infinite 1.8s}
    .bt{animation:bg 3.5s ease-in-out infinite}
    .bb{animation:bg 3.5s ease-in-out infinite 1.75s}
    .lp{animation:lp 3s ease-in-out infinite}
    .usw{animation:usw 5s ease-in-out infinite}
    .vw{animation:vw 5s ease-in-out infinite 2.5s}
  </style>

  <rect width="900" height="225" fill="#0d1117"/>
  <rect width="900" height="225" fill="url(#grid)" opacity="0.22"/>
  <rect width="900" height="225" fill="url(#cg)"/>

  <!-- Borders -->
  <line x1="0" y1="1" x2="900" y2="1" stroke="#7c3aed" stroke-width="1.5" class="bt"/>
  <line x1="0" y1="224" x2="900" y2="224" stroke="#7c3aed" stroke-width="1.5" class="bb"/>

  <!-- Corner L-brackets -->
  <path d="M0 0 L55 0 M0 0 L0 55" stroke="#7c3aed" stroke-width="1.5" fill="none" opacity="0.85"/>
  <path d="M900 0 L845 0 M900 0 L900 55" stroke="#7c3aed" stroke-width="1.5" fill="none" opacity="0.85"/>
  <path d="M0 225 L55 225 M0 225 L0 170" stroke="#7c3aed" stroke-width="1.5" fill="none" opacity="0.85"/>
  <path d="M900 225 L845 225 M900 225 L900 170" stroke="#7c3aed" stroke-width="1.5" fill="none" opacity="0.85"/>
  <path d="M6 6 L25 6 M6 6 L6 25" stroke="#a855f7" stroke-width="0.7" fill="none" opacity="0.5"/>
  <path d="M894 6 L875 6 M894 6 L894 25" stroke="#a855f7" stroke-width="0.7" fill="none" opacity="0.5"/>
  <path d="M6 219 L25 219 M6 219 L6 200" stroke="#a855f7" stroke-width="0.7" fill="none" opacity="0.5"/>
  <path d="M894 219 L875 219 M894 219 L894 200" stroke="#a855f7" stroke-width="0.7" fill="none" opacity="0.5"/>

  <!-- Left pulse rings -->
  <circle cx="72" cy="108" r="8" fill="none" stroke="#7c3aed" stroke-width="1.2" class="r1"/>
  <circle cx="72" cy="108" r="8" fill="none" stroke="#7c3aed" stroke-width="1" class="r2"/>
  <circle cx="72" cy="108" r="8" fill="none" stroke="#7c3aed" stroke-width="0.8" class="r3"/>
  <circle cx="72" cy="108" r="6" fill="none" stroke="#a855f7" stroke-width="1" class="r4"/>
  <circle cx="72" cy="108" r="6" fill="none" stroke="#a855f7" stroke-width="0.8" class="r5"/>
  <circle cx="72" cy="108" r="5" fill="#7c3aed" class="lp"/>
  <circle cx="72" cy="108" r="2.5" fill="#ddd6fe"/>

  <!-- Right pulse rings -->
  <circle cx="828" cy="108" r="8" fill="none" stroke="#7c3aed" stroke-width="1.2" class="r2"/>
  <circle cx="828" cy="108" r="8" fill="none" stroke="#7c3aed" stroke-width="0.8" class="r3"/>
  <circle cx="828" cy="108" r="5" fill="#7c3aed" class="lp"/>
  <circle cx="828" cy="108" r="2.5" fill="#ddd6fe"/>

  <!-- Dot rows -->
  <circle cx="120" cy="108" r="2.2" fill="#7c3aed" class="d1"/>
  <circle cx="134" cy="108" r="2.2" fill="#7c3aed" class="d2"/>
  <circle cx="148" cy="108" r="2.2" fill="#7c3aed" class="d3"/>
  <circle cx="162" cy="108" r="2.2" fill="#7c3aed" class="d4"/>
  <circle cx="738" cy="108" r="2.2" fill="#7c3aed" class="d5"/>
  <circle cx="752" cy="108" r="2.2" fill="#7c3aed" class="d6"/>
  <circle cx="766" cy="108" r="2.2" fill="#7c3aed" class="d7"/>
  <circle cx="780" cy="108" r="2.2" fill="#7c3aed" class="d8"/>
  <line x1="120" y1="96" x2="175" y2="96" stroke="#7c3aed" stroke-width="0.5" opacity="0.4"/>
  <line x1="120" y1="120" x2="175" y2="120" stroke="#7c3aed" stroke-width="0.5" opacity="0.4"/>
  <line x1="725" y1="96" x2="780" y2="96" stroke="#7c3aed" stroke-width="0.5" opacity="0.4"/>
  <line x1="725" y1="120" x2="780" y2="120" stroke="#7c3aed" stroke-width="0.5" opacity="0.4"/>

  <!-- Glitch slices -->
  <g clip-path="url(#c1)">
    <text x="450" y="122" text-anchor="middle" font-family="'Orbitron',monospace" font-size="60" font-weight="900" fill="#ec4899" letter-spacing="2" class="ts1">JANYEL LIMA</text>
  </g>
  <g clip-path="url(#c2)">
    <text x="450" y="122" text-anchor="middle" font-family="'Orbitron',monospace" font-size="60" font-weight="900" fill="#06b6d4" letter-spacing="2" class="ts2">JANYEL LIMA</text>
  </g>
  <g clip-path="url(#c3)">
    <text x="450" y="122" text-anchor="middle" font-family="'Orbitron',monospace" font-size="60" font-weight="900" fill="#a855f7" letter-spacing="2" class="ts3">JANYEL LIMA</text>
  </g>

  <!-- Main title -->
  <text x="450" y="122" text-anchor="middle" font-family="'Orbitron',monospace" font-size="60" font-weight="900" fill="#ffffff" letter-spacing="2" class="tm">JANYEL LIMA</text>

  <!-- UNLIMITED SOFTWARE WORKS — shimmer charge -->
  <text x="450" y="158" text-anchor="middle" font-family="'Rajdhani','Orbitron',monospace" font-size="13.5" font-weight="700" fill="#7c3aed" letter-spacing="7" class="usw">UNLIMITED SOFTWARE WORKS</text>

  <!-- void-works — breath -->
  <text x="450" y="192" text-anchor="middle" font-family="'Rajdhani','Orbitron',monospace" font-size="11" font-weight="700" fill="#a855f7" letter-spacing="10" opacity="0.45" class="vw">&lt;void-works/&gt;</text>

  <!-- Scan line -->
  <rect width="900" height="1.5" fill="#7c3aed" opacity="0.12" class="sl" y="0"/>
</svg>
