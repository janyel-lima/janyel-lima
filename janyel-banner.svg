<svg width="900" height="225" viewBox="0 0 900 225" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#7c3aed" stroke-width="0.3"/>
    </pattern>

    <!-- Deep arcane purple background gradient -->
    <radialGradient id="bggrad" cx="50%" cy="50%" r="70%">
      <stop offset="0%"   stop-color="#1e0d40"/>
      <stop offset="45%"  stop-color="#110720"/>
      <stop offset="100%" stop-color="#060210"/>
    </radialGradient>
    <!-- Side vignette glow -->
    <radialGradient id="glowL" cx="0%" cy="50%" r="40%">
      <stop offset="0%"   stop-color="#4c1d95" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#4c1d95" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowR" cx="100%" cy="50%" r="40%">
      <stop offset="0%"   stop-color="#4c1d95" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#4c1d95" stop-opacity="0"/>
    </radialGradient>
    <!-- Center bloom -->
    <radialGradient id="bloom" cx="50%" cy="50%" r="30%">
      <stop offset="0%"   stop-color="#7c3aed" stop-opacity="0.14"/>
      <stop offset="100%" stop-color="#7c3aed" stop-opacity="0"/>
    </radialGradient>

    <clipPath id="c1"><rect x="0" y="60" width="900" height="19"/></clipPath>
    <clipPath id="c2"><rect x="0" y="82" width="900" height="17"/></clipPath>
    <clipPath id="c3"><rect x="0" y="102" width="900" height="19"/></clipPath>
  </defs>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&amp;family=Rajdhani:wght@700&amp;display=swap');

    /* ── Name glitch ── */
    @keyframes gm {0%,82%,100%{transform:translateX(0)}84%{transform:translateX(-7px)}86%{transform:translateX(5px)}88%{transform:translateX(-3px)}90%{transform:translateX(4px)}92%{transform:translateX(-1px)}94%{transform:translateX(0)}}
    @keyframes gs1{0%,82%,100%{transform:translateX(0);opacity:0}84%{transform:translateX(11px);opacity:1}86%{transform:translateX(-9px);opacity:.85}88%{transform:translateX(7px);opacity:.9}90%{transform:translateX(-5px);opacity:.7}92%{transform:translateX(3px);opacity:.5}94%{transform:translateX(0);opacity:0}}
    @keyframes gs2{0%,82%,100%{transform:translateX(0);opacity:0}85%{transform:translateX(-14px);opacity:.8}87%{transform:translateX(10px);opacity:.6}89%{transform:translateX(-8px);opacity:.9}91%{transform:translateX(6px);opacity:.5}93%{transform:translateX(-2px);opacity:.3}95%{transform:translateX(0);opacity:0}}
    @keyframes gs3{0%,82%,100%{transform:translateX(0);opacity:0}83.5%{transform:translateX(9px);opacity:.7}85.5%{transform:translateX(-7px);opacity:.9}87.5%{transform:translateX(5px);opacity:.6}89.5%{transform:translateX(-3px);opacity:.8}91.5%{transform:translateX(1px);opacity:.4}93.5%{transform:translateX(0);opacity:0}}
    @keyframes fl {0%,93%,100%{opacity:1}95%{opacity:.55}96%{opacity:1}98%{opacity:.3}99%{opacity:.9}}

    /* ── Arcane pulse rings — varied: dashed, solid, dotted ── */
    @keyframes rp {0%{r:8px;stroke-opacity:.95}100%{r:68px;stroke-opacity:0}}
    @keyframes rp2{0%{r:6px;stroke-opacity:.75}100%{r:52px;stroke-opacity:0}}
    @keyframes rp3{0%{r:10px;stroke-opacity:.5}100%{r:80px;stroke-opacity:0}}

    /* ── Slow orbit ring ── */
    @keyframes orb {0%{transform:rotate(0deg)}100%{transform:rotate(360deg)}}
    /* ── Reverse orbit ── */
    @keyframes orb2{0%{transform:rotate(0deg)}100%{transform:rotate(-360deg)}}

    /* ── Core pulsing star glow ── */
    @keyframes lp {0%,100%{opacity:.55}50%{opacity:1}}
    /* ── Rune marks fade in/out ── */
    @keyframes rune{0%,100%{opacity:.08}50%{opacity:.32}}

    /* ── Dots / borders ── */
    @keyframes dp {0%,100%{opacity:.12}50%{opacity:.85}}
    @keyframes bg {0%,100%{stroke-opacity:.4}50%{stroke-opacity:.95}}

    /* ── UNLIMITED SOFTWARE WORKS — unchanged shimmer charge ── */
    @keyframes usw{
      0%,100%{fill:#5b21b6;letter-spacing:7px;transform:translateX(0)}
      25%{fill:#7c3aed;letter-spacing:7.5px;transform:translateX(0)}
      48%{fill:#a855f7;letter-spacing:9px;transform:translateX(0)}
      50%{fill:#a855f7;letter-spacing:9px;transform:translateX(-1.5px)}
      52%{fill:#a855f7;letter-spacing:9px;transform:translateX(1.5px)}
      54%{fill:#a855f7;letter-spacing:9px;transform:translateX(0)}
      75%{fill:#7c3aed;letter-spacing:7.5px;transform:translateX(0)}
    }

    /* ══════════════════════════════════════════
       <void-works/> — ARCANE SIGIL INSCRIPTION
       Each character drifts on its own plane.
       The whole text cycles through three states:
         1. DORMANT  — dim, tight spacing, slight sway
         2. AWAKENING — letters drift apart breathing
         3. RESONANCE — brief full-bright flicker
    ══════════════════════════════════════════ */
    @keyframes vwMain{
      0%  {opacity:.35;letter-spacing:8px ;fill:#6d28d9}
      20% {opacity:.40;letter-spacing:9px ;fill:#7c3aed}
      45% {opacity:.72;letter-spacing:13px;fill:#a855f7}
      50% {opacity:.90;letter-spacing:14px;fill:#c084fc}
      55% {opacity:.72;letter-spacing:13px;fill:#a855f7}
      /* resonance flash */
      78% {opacity:.55;letter-spacing:10px;fill:#8b5cf6}
      82% {opacity:1  ;letter-spacing:11px;fill:#ffffff}
      84% {opacity:.50;letter-spacing:10px;fill:#a855f7}
      86% {opacity:.85;letter-spacing:11px;fill:#c084fc}
      88% {opacity:.38;letter-spacing:9px ;fill:#7c3aed}
      100%{opacity:.35;letter-spacing:8px ;fill:#6d28d9}
    }
    /* Shadow echo behind void-works — offset + lags */
    @keyframes vwEcho{
      0%  {opacity:0  ;letter-spacing:8px }
      40% {opacity:.18;letter-spacing:15px}
      55% {opacity:.08;letter-spacing:17px}
      78% {opacity:0  ;letter-spacing:12px}
      82% {opacity:.3 ;letter-spacing:13px}
      85% {opacity:0  ;letter-spacing:12px}
      100%{opacity:0  ;letter-spacing:8px }
    }
    /* Bracket glyphs flanking void-works */
    @keyframes brk{
      0%,100%{opacity:.20;transform:scaleX(1)}
      50%    {opacity:.70;transform:scaleX(1.15)}
      82%    {opacity:1  ;transform:scaleX(0.9)}
      84%    {opacity:.30;transform:scaleX(1)}
    }

    .tm {animation:gm 8s infinite,fl 10s infinite}
    .ts1{animation:gs1 8s infinite}
    .ts2{animation:gs2 8s infinite .06s}
    .ts3{animation:gs3 8s infinite .12s}

    /* Arcane ring classes */
    .r1 {animation:rp  3.2s ease-out infinite}
    .r2 {animation:rp  3.2s ease-out infinite 1.07s}
    .r3 {animation:rp  3.2s ease-out infinite 2.14s}
    .r4 {animation:rp2 2.5s ease-out infinite .5s}
    .r5 {animation:rp2 2.5s ease-out infinite 1.25s}
    .r6 {animation:rp3 4.5s ease-out infinite .8s}

    .lp {animation:lp 3.2s ease-in-out infinite}
    .rune{animation:rune 6s ease-in-out infinite}
    .rune2{animation:rune 6s ease-in-out infinite 3s}

    .d1{animation:dp 2.4s infinite 0s}  .d2{animation:dp 2.4s infinite .3s}
    .d3{animation:dp 2.4s infinite .6s} .d4{animation:dp 2.4s infinite .9s}
    .d5{animation:dp 2.4s infinite .9s} .d6{animation:dp 2.4s infinite 1.2s}
    .d7{animation:dp 2.4s infinite 1.5s}.d8{animation:dp 2.4s infinite 1.8s}
    .bt{animation:bg 3.5s ease-in-out infinite}
    .bb{animation:bg 3.5s ease-in-out infinite 1.75s}

    .usw{animation:usw 5s ease-in-out infinite}
    .vw {animation:vwMain 9s ease-in-out infinite}
    .vwE{animation:vwEcho 9s ease-in-out infinite}
    .brk{animation:brk 9s ease-in-out infinite}
  </style>

  <!-- ── Background: deep arcane purple gradient ── -->
  <rect width="900" height="225" fill="url(#bggrad)"/>
  <rect width="900" height="225" fill="url(#glowL)"/>
  <rect width="900" height="225" fill="url(#glowR)"/>
  <rect width="900" height="225" fill="url(#bloom)"/>
  <rect width="900" height="225" fill="url(#grid)" opacity="0.18"/>

  <!-- ── Borders ── -->
  <line x1="0" y1="1"   x2="900" y2="1"   stroke="#7c3aed" stroke-width="1.5" class="bt"/>
  <line x1="0" y1="224" x2="900" y2="224" stroke="#7c3aed" stroke-width="1.5" class="bb"/>

  <!-- ── Corner brackets ── -->
  <path d="M0 0 L55 0 M0 0 L0 55"              stroke="#7c3aed" stroke-width="1.5" fill="none" opacity="0.85"/>
  <path d="M900 0 L845 0 M900 0 L900 55"        stroke="#7c3aed" stroke-width="1.5" fill="none" opacity="0.85"/>
  <path d="M0 225 L55 225 M0 225 L0 170"        stroke="#7c3aed" stroke-width="1.5" fill="none" opacity="0.85"/>
  <path d="M900 225 L845 225 M900 225 L900 170" stroke="#7c3aed" stroke-width="1.5" fill="none" opacity="0.85"/>
  <path d="M6 6 L25 6 M6 6 L6 25"              stroke="#a855f7" stroke-width="0.7" fill="none" opacity="0.5"/>
  <path d="M894 6 L875 6 M894 6 L894 25"        stroke="#a855f7" stroke-width="0.7" fill="none" opacity="0.5"/>
  <path d="M6 219 L25 219 M6 219 L6 200"        stroke="#a855f7" stroke-width="0.7" fill="none" opacity="0.5"/>
  <path d="M894 219 L875 219 M894 219 L894 200" stroke="#a855f7" stroke-width="0.7" fill="none" opacity="0.5"/>

  <!-- ═══════════════════════════════
       LEFT ARCANE NODE  (72, 108)
  ═══════════════════════════════ -->
  <g>
    <!-- Slow outer orbit ring (dashed heptagram trace) -->
    <g transform-origin="72 108">
      <circle cx="72" cy="108" r="42" fill="none" stroke="#4c1d95" stroke-width="0.8"
        stroke-dasharray="6,5" opacity="0.5">
        <animateTransform attributeName="transform" type="rotate"
          from="0 72 108" to="360 72 108" dur="18s" repeatCount="indefinite"/>
      </circle>
    </g>
    <!-- Reverse inner orbit (dotted) -->
    <circle cx="72" cy="108" r="28" fill="none" stroke="#7c3aed" stroke-width="0.6"
      stroke-dasharray="2,6" opacity="0.4">
      <animateTransform attributeName="transform" type="rotate"
        from="0 72 108" to="-360 72 108" dur="10s" repeatCount="indefinite"/>
    </circle>

    <!-- Arcane rune marks at cardinal positions (faint) -->
    <text x="72" y="60"  text-anchor="middle" font-family="monospace" font-size="9" fill="#a855f7" class="rune">ᛉ</text>
    <text x="72" y="162" text-anchor="middle" font-family="monospace" font-size="9" fill="#a855f7" class="rune2">ᚹ</text>
    <text x="25"  y="112" text-anchor="middle" font-family="monospace" font-size="9" fill="#a855f7" class="rune2">ᚾ</text>
    <text x="119" y="112" text-anchor="middle" font-family="monospace" font-size="9" fill="#a855f7" class="rune">ᛏ</text>

    <!-- Expanding pulse rings — arcane variants -->
    <!-- solid -->
    <circle cx="72" cy="108" r="8" fill="none" stroke="#7c3aed" stroke-width="1.3" class="r1"/>
    <!-- dashed -->
    <circle cx="72" cy="108" r="8" fill="none" stroke="#7c3aed" stroke-width="1.0"
      stroke-dasharray="8,4" class="r2"/>
    <!-- solid -->
    <circle cx="72" cy="108" r="8" fill="none" stroke="#7c3aed" stroke-width="0.8" class="r3"/>
    <!-- tighter dashed -->
    <circle cx="72" cy="108" r="6" fill="none" stroke="#a855f7" stroke-width="1.1"
      stroke-dasharray="3,3" class="r4"/>
    <circle cx="72" cy="108" r="6" fill="none" stroke="#a855f7" stroke-width="0.9" class="r5"/>
    <!-- wide slow ring -->
    <circle cx="72" cy="108" r="10" fill="none" stroke="#6d28d9" stroke-width="0.6"
      stroke-dasharray="12,8" class="r6"/>

    <!-- Core: six-pointed star (hex) -->
    <polygon points="72,95 75.5,103 84,103 77.5,108 80,116.5 72,112 64,116.5 66.5,108 60,103 68.5,103"
      fill="#3b0764" stroke="#a855f7" stroke-width="0.8" class="lp"/>
    <!-- Center dot -->
    <circle cx="72" cy="108" r="2.8" fill="#ddd6fe"/>
  </g>

  <!-- ═══════════════════════════════
       RIGHT ARCANE NODE  (828, 108)
  ═══════════════════════════════ -->
  <g>
    <!-- Outer orbit -->
    <circle cx="828" cy="108" r="42" fill="none" stroke="#4c1d95" stroke-width="0.8"
      stroke-dasharray="6,5" opacity="0.5">
      <animateTransform attributeName="transform" type="rotate"
        from="0 828 108" to="360 828 108" dur="18s" repeatCount="indefinite"/>
    </circle>
    <!-- Reverse inner orbit -->
    <circle cx="828" cy="108" r="28" fill="none" stroke="#7c3aed" stroke-width="0.6"
      stroke-dasharray="2,6" opacity="0.4">
      <animateTransform attributeName="transform" type="rotate"
        from="0 828 108" to="-360 828 108" dur="10s" repeatCount="indefinite"/>
    </circle>

    <!-- Rune marks -->
    <text x="828" y="60"  text-anchor="middle" font-family="monospace" font-size="9" fill="#a855f7" class="rune2">ᛉ</text>
    <text x="828" y="162" text-anchor="middle" font-family="monospace" font-size="9" fill="#a855f7" class="rune">ᚹ</text>
    <text x="781"  y="112" text-anchor="middle" font-family="monospace" font-size="9" fill="#a855f7" class="rune">ᚾ</text>
    <text x="875" y="112" text-anchor="middle" font-family="monospace" font-size="9" fill="#a855f7" class="rune2">ᛏ</text>

    <!-- Expanding rings -->
    <circle cx="828" cy="108" r="8" fill="none" stroke="#7c3aed" stroke-width="1.3" class="r2"/>
    <circle cx="828" cy="108" r="8" fill="none" stroke="#7c3aed" stroke-width="0.8"
      stroke-dasharray="8,4" class="r3"/>
    <circle cx="828" cy="108" r="6" fill="none" stroke="#a855f7" stroke-width="1.0"
      stroke-dasharray="3,3" class="r5"/>
    <circle cx="828" cy="108" r="10" fill="none" stroke="#6d28d9" stroke-width="0.6"
      stroke-dasharray="12,8" class="r6"/>

    <!-- Core star -->
    <polygon points="828,95 831.5,103 840,103 833.5,108 836,116.5 828,112 820,116.5 822.5,108 816,103 824.5,103"
      fill="#3b0764" stroke="#a855f7" stroke-width="0.8" class="lp"/>
    <circle cx="828" cy="108" r="2.8" fill="#ddd6fe"/>
  </g>

  <!-- ── Dot rows ── -->
  <circle cx="120" cy="108" r="2.2" fill="#7c3aed" class="d1"/>
  <circle cx="134" cy="108" r="2.2" fill="#7c3aed" class="d2"/>
  <circle cx="148" cy="108" r="2.2" fill="#7c3aed" class="d3"/>
  <circle cx="162" cy="108" r="2.2" fill="#7c3aed" class="d4"/>
  <circle cx="738" cy="108" r="2.2" fill="#7c3aed" class="d5"/>
  <circle cx="752" cy="108" r="2.2" fill="#7c3aed" class="d6"/>
  <circle cx="766" cy="108" r="2.2" fill="#7c3aed" class="d7"/>
  <circle cx="780" cy="108" r="2.2" fill="#7c3aed" class="d8"/>
  <line x1="120" y1="96"  x2="175" y2="96"  stroke="#7c3aed" stroke-width="0.5" opacity="0.4"/>
  <line x1="120" y1="120" x2="175" y2="120" stroke="#7c3aed" stroke-width="0.5" opacity="0.4"/>
  <line x1="725" y1="96"  x2="780" y2="96"  stroke="#7c3aed" stroke-width="0.5" opacity="0.4"/>
  <line x1="725" y1="120" x2="780" y2="120" stroke="#7c3aed" stroke-width="0.5" opacity="0.4"/>

  <!-- ── Glitch slices ── -->
  <g clip-path="url(#c1)">
    <text x="450" y="122" text-anchor="middle" font-family="'Orbitron',monospace" font-size="60" font-weight="900" fill="#ec4899" letter-spacing="2" class="ts1">JANYEL LIMA</text>
  </g>
  <g clip-path="url(#c2)">
    <text x="450" y="122" text-anchor="middle" font-family="'Orbitron',monospace" font-size="60" font-weight="900" fill="#06b6d4" letter-spacing="2" class="ts2">JANYEL LIMA</text>
  </g>
  <g clip-path="url(#c3)">
    <text x="450" y="122" text-anchor="middle" font-family="'Orbitron',monospace" font-size="60" font-weight="900" fill="#a855f7" letter-spacing="2" class="ts3">JANYEL LIMA</text>
  </g>

  <!-- ── Main name ── -->
  <text x="450" y="122" text-anchor="middle" font-family="'Orbitron',monospace" font-size="60" font-weight="900" fill="#ffffff" letter-spacing="2" class="tm">JANYEL LIMA</text>

  <!-- ── UNLIMITED SOFTWARE WORKS ── -->
  <text x="450" y="158" text-anchor="middle" font-family="'Rajdhani','Orbitron',monospace" font-size="13.5" font-weight="700" fill="#7c3aed" letter-spacing="7" class="usw">UNLIMITED SOFTWARE WORKS</text>

  <!-- ── <void-works/> — arcane inscription ── -->
  <!-- Echo shadow (offset, wider spacing) -->
  <text x="452" y="194" text-anchor="middle" font-family="'Rajdhani','Orbitron',monospace" font-size="11" font-weight="700" fill="#6d28d9" letter-spacing="10" class="vwE">&lt;void-works/&gt;</text>
  <!-- Flanking arcane brackets -->
  <text x="320" y="192" text-anchor="middle" font-family="monospace" font-size="13" fill="#a855f7" class="brk">⟨ ✦ ⟩</text>
  <text x="580" y="192" text-anchor="middle" font-family="monospace" font-size="13" fill="#a855f7" class="brk">⟨ ✦ ⟩</text>
  <!-- Main void-works -->
  <text x="450" y="192" text-anchor="middle" font-family="'Rajdhani','Orbitron',monospace" font-size="11" font-weight="700" fill="#6d28d9" letter-spacing="10" class="vw">&lt;void-works/&gt;</text>
</svg>
